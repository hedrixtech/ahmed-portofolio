    <script>
        // Enhanced Proxy for 3D Interaction & Scrolling
        window.addEventListener('message', (event) => {
            if (event.data.type === 'MOUSE_MOVE') {
                const { x, y } = event.data;
                const props = {
                    clientX: x,
                    clientY: y,
                    pageX: x,
                    pageY: y,
                    bubbles: true,
                    cancelable: true,
                    view: window
                };
                
                const moveEvent = new MouseEvent('mousemove', props);
                const pointerEvent = new PointerEvent('pointermove', props);
                const touchEvent = new TouchEvent('touchmove', {
                    ...props,
                    touches: [{ clientX: x, clientY: y, pageX: x, pageY: y }]
                });
                
                [window, document].forEach(target => {
                    target.dispatchEvent(moveEvent);
                    target.dispatchEvent(pointerEvent);
                    target.dispatchEvent(touchEvent);
                });

                const canvases = document.querySelectorAll('canvas');
                canvases.forEach(c => {
                    c.dispatchEvent(moveEvent);
                    c.dispatchEvent(pointerEvent);
                    c.dispatchEvent(touchEvent);
                });
            }

            if (event.data.type === 'SCROLL_SYNC') {
                const { scrollY } = event.data;
                // Update internal scroll position to drive ScrollTrigger/3D animations
                window.scrollTo(0, scrollY);
                window.dispatchEvent(new Event('scroll'));
            }
        });
    </script>

    <script>
        function setVH() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);

        setVH();
        window.addEventListener('resize', setVH);

        // Signal parent that 3D is ready after a small delay to ensure rendering has started
